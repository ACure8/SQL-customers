<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <title>Wow Foods</title>
</head>
    <body>
        <div class="night-lightmode" onclick="darklightmode()"><i class="ri-moon-fill"></i></div>
        <nav class = "nav">
            <a href="{{ url_for('home_page') }}">
                <img id="logo" src="{{ url_for('static', filename='logos/white w logo.png') }}" alt="wowfoods-logo">
            </a>
            <div class="contentbar">
                <i class="ri-menu-fill"></i>
            </div>

            <div class="nav-buttons">
                {% if session.get('user_id') %}
                    <a href="{{ url_for('home_page_user', username=session.get('full_name')) }}" id="navbutton" class="home">Home</a>
                    <a href="{{ url_for('menu_page_user', username=session.get('full_name')) }}" id="navbutton" class="menu">Menu</a>
                    <a href="{{ url_for('account_page_user', username=session.get('full_name')) }}" id="navbutton" class="calltoaction"><i class="ri-user-line" id="navi"></i>Account</a>
                    <a href="{{ url_for('cart_page_user', username=session.get('full_name')) }}" id="navbutton" class="calltoaction"><i class="ri-shopping-cart-2-line" id="navi"></i>Cart</a>
                {% else %}
                    <a href="{{ url_for('home_page') }}" id="navbutton" class="home">Home</a>
                    <a href="{{ url_for('menu_page') }}" id="navbutton" class="menu">Menu</a>
                    <a href="{{ url_for('signin_page') }}" id="navbutton" class="calltoaction"><i class="ri-user-line" id="navi"></i>Sign in</a>
                    <a href="{{ url_for('cart_page') }}" id="navbutton" class="calltoaction"><i class="ri-shopping-cart-2-line" id="navi"></i>Cart</a>
                {% endif %}
            </div>
        </nav>

            <div class="form-page">
                <h2>Welcome, {{ session.get('full_name') }}!</h2>
                <form action="{{ url_for('signout') }}" method="POST">
                    <button class="btn-primary" type="submit">Sign Out</button>
                </form>
            </div>
        </div> -->
        


        <footer>
            <p>&copy; 2026 Wow Foods. All rights reserved.</p>
        </footer>
        <script src="{{ url_for('static', filename='SQL.js') }}"></script>
    </body>
</html>
